name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify affiliate availability data
        run: npm run verify:availability

      - name: Verify first-party testing evidence (when CSV present)
        run: npm run testing:verify

      - name: Build
        run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
