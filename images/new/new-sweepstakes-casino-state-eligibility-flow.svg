<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-labelledby="newGeoTitle newGeoDesc">
  <title id="newGeoTitle">Two eligibility gates for new sweepstakes casinos</title>
  <desc id="newGeoDesc">Flow diagram showing the two independent rules that decide whether a new sweepstakes casino is available to a US visitor: Sweepstakes Wiz first suppresses affiliate offers in 13 US states where the model is banned or affiliate marketing carries direct exposure, then each operator applies its own excluded-state list. Both gates must pass before offers are shown.</desc>
  <defs>
    <style>
      .new-font-display { font-family: 'Sora', system-ui, sans-serif; }
      .new-font-body { font-family: 'DM Sans', system-ui, sans-serif; }
    </style>
    <marker id="newGeoArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="newGeoBlock" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="newGeoOk" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="720" height="320" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <text x="360" y="30" text-anchor="middle" class="new-font-display" font-size="16" font-weight="800" fill="#0a1628">Two gates decide if a new casino is available to you</text>
  <text x="360" y="50" text-anchor="middle" class="new-font-body" font-size="11" fill="#64748b">Our editorial suppression layer, then the operator's own excluded-state list</text>

  <rect x="24" y="128" width="120" height="72" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="84" y="156" text-anchor="middle" class="new-font-display" font-size="12" font-weight="700" fill="#0a1628">You</text>
  <text x="84" y="176" text-anchor="middle" class="new-font-body" font-size="10" fill="#475569">visiting from a</text>
  <text x="84" y="190" text-anchor="middle" class="new-font-body" font-size="10" fill="#475569">US state</text>

  <line x1="146" y1="164" x2="184" y2="164" stroke="#94a3b8" stroke-width="2" marker-end="url(#newGeoArrow)"/>

  <rect x="186" y="112" width="212" height="112" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="292" y="136" text-anchor="middle" class="new-font-display" font-size="12" font-weight="800" fill="#1e3a8a">Gate 1: Wiz suppression</text>
  <text x="292" y="156" text-anchor="middle" class="new-font-body" font-size="10.5" fill="#1a56db">13 US states, info only</text>
  <text x="292" y="172" text-anchor="middle" class="new-font-body" font-size="9.5" fill="#475569">CA, NY, MT, CT, NV, NJ,</text>
  <text x="292" y="186" text-anchor="middle" class="new-font-body" font-size="9.5" fill="#475569">LA, MI, ID, WA, IN, ME, TN</text>
  <text x="292" y="206" text-anchor="middle" class="new-font-body" font-size="9" fill="#64748b">Oklahoma joins Nov 1, 2026</text>

  <line x1="292" y1="224" x2="292" y2="256" stroke="#dc2626" stroke-width="2" marker-end="url(#newGeoBlock)"/>
  <rect x="186" y="260" width="212" height="40" rx="9" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="292" y="278" text-anchor="middle" class="new-font-display" font-size="11" font-weight="700" fill="#b91c1c">No affiliate offers shown</text>
  <text x="292" y="292" text-anchor="middle" class="new-font-body" font-size="9.5" fill="#7f1d1d">Editorial information only</text>

  <line x1="398" y1="168" x2="440" y2="168" stroke="#10b981" stroke-width="2" marker-end="url(#newGeoOk)"/>

  <rect x="442" y="112" width="256" height="112" rx="9" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="570" y="136" text-anchor="middle" class="new-font-display" font-size="12" font-weight="800" fill="#1e3a8a">Gate 2: Operator exclusions</text>
  <text x="570" y="156" text-anchor="middle" class="new-font-body" font-size="10.5" fill="#1a56db">Each brand's own restricted list</text>
  <text x="570" y="176" text-anchor="middle" class="new-font-body" font-size="9.5" fill="#475569">e.g. American Luck: ID, MI, WA</text>
  <text x="570" y="196" text-anchor="middle" class="new-font-body" font-size="9" fill="#64748b">Always confirmed on the official site</text>

  <line x1="570" y1="224" x2="570" y2="256" stroke="#dc2626" stroke-width="2" marker-end="url(#newGeoBlock)"/>
  <rect x="442" y="260" width="256" height="40" rx="9" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="570" y="278" text-anchor="middle" class="new-font-display" font-size="11" font-weight="700" fill="#b91c1c">Registration blocked at the operator</text>
  <text x="570" y="292" text-anchor="middle" class="new-font-body" font-size="9.5" fill="#7f1d1d">Not available to your state</text>

  <text x="415" y="88" text-anchor="middle" class="new-font-body" font-size="10" fill="#047857">Pass</text>
  <text x="415" y="104" text-anchor="middle" class="new-font-display" font-size="10" font-weight="700" fill="#047857">both gates</text>
  <text x="360" y="70" text-anchor="middle" class="new-font-body" font-size="10" fill="#64748b">Info-only in 13 of 51 US jurisdictions (~25%); the rest see live offers where the operator allows</text>

  <text x="360" y="310" text-anchor="middle" class="new-font-body" font-size="10" fill="#64748b">Source: SweepstakesWiz /new/ hub eligibility layer, July 2026</text>
</svg>
